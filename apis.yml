name: Amazon EventBridge Scheduler
description: Amazon EventBridge Scheduler is a fully managed, serverless scheduler that enables you to create, run, and manage tasks from one central, managed service. With EventBridge Scheduler, you 
  can create millions of schedules using cron and rate expressions.
